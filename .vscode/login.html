<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Sou Cinema</title>
    <style>
        /* --- ĐỒNG BỘ MÀU SẮC VỚI TRANG INDEX --- */
        :root {
            --bg-main: #0f172a;        
            --bg-panel: #1e293b;       
            --accent: #00e5ff;         
            --accent-hover: #00b3cc;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
            /* Thêm chút ảnh nền mờ mờ cho có không khí rạp phim (Tùy chọn) */
            background-image: radial-gradient(circle at top, rgba(0, 229, 255, 0.1) 0%, transparent 50%);
        }

        /* --- CÂU CHÀO MỪNG --- */
        .welcome-section {
            text-align: center; margin-bottom: 30px;
        }
        .welcome-section h1 {
            font-size: 32px; font-weight: 300; letter-spacing: 1px; color: var(--text-main);
        }
        .welcome-section .brand-name {
            font-size: 42px; font-weight: bold; color: var(--accent);
            text-transform: uppercase; letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            display: block; margin-top: 5px;
        }
        .welcome-section p {
            color: var(--text-muted); margin-top: 10px; font-size: 16px;
        }

        /* --- KHUNG FORM ĐĂNG NHẬP --- */
        .auth-container {
            background: var(--bg-panel); padding: 40px; border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); width: 100%; max-width: 420px;
            border: 1px solid var(--border);
        }
        
        .form-header {
            text-align: center; margin-bottom: 25px; font-size: 22px; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 15px;
        }

        .form-group { margin-bottom: 18px; position: relative; }
        .form-group input {
            width: 100%; padding: 14px 15px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-main); color: var(--text-main); font-size: 15px;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.15);
        }
        .form-group input::placeholder { color: var(--text-muted); }
        
        /* Hiển thị lỗi/thành công kế bên input */
        .check-msg { 
            position: absolute; right: 12px; top: 14px; font-size: 13px; font-weight: bold; 
            background: var(--bg-main); padding: 0 5px;
        }

        .btn-submit {
            width: 100%; padding: 15px; background: var(--accent); color: #000;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; 
            margin-top: 15px; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2);
        }
        .btn-submit:hover { 
            background: var(--accent-hover); transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.4); 
        }

        .switch-form { 
            margin-top: 25px; font-size: 14px; color: var(--text-muted); text-align: center;
        }
        .switch-form span { 
            color: var(--accent); cursor: pointer; font-weight: bold; text-decoration: none; 
            transition: color 0.3s;
        }
        .switch-form span:hover { color: #fff; text-decoration: underline; }

        /* Mặc định ẩn form đăng ký */
        #registerForm { display: none; }
    </style>
</head>
<body>

    <div class="welcome-section">
        <h1>Chào mừng bạn đến với</h1>
        <span class="brand-name">Sou - Cinema</span>
        <p>Đăng nhập để trải nghiệm không gian điện ảnh đỉnh cao</p>
    </div>

    <div class="auth-container">
        <div class="form-header" id="formTitle">🍿 Đăng Nhập</div>

        <div id="loginForm">
            <div class="form-group">
                <input type="text" id="loginUsername" placeholder="Tên tài khoản" required>
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="Mật khẩu" required>
            </div>
            <button id="loginBtn" class="btn-submit">Đăng Nhập</button>
            <div class="switch-form">
                Bạn chưa có tài khoản? <span onclick="toggleForm('register')">Đăng ký ngay</span>
            </div>
        </div>

        <div id="registerForm">
            <div class="form-group">
                <input type="text" id="regUsername" placeholder="Tên tài khoản" required>
                <span id="userCheckMsg" class="check-msg"></span>
            </div>
            <div class="form-group">
                <input type="password" id="regPassword" placeholder="Mật khẩu" required>
            </div>
            <div class="form-group">
                <input type="password" id="regConfirmPassword" placeholder="Nhập lại mật khẩu" required>
                <span id="passCheckMsg" class="check-msg"></span>
            </div>
            <div class="form-group">
                <input type="email" id="regEmail" placeholder="Email (VD: abc@gmail.com)" required>
            </div>
            <div class="form-group">
                <input type="tel" id="regPhone" placeholder="Số điện thoại" required>
            </div>
            <button id="registerBtn" class="btn-submit">Tạo Tài Khoản</button>
            <div class="switch-form">
                Đã có tài khoản? <span onclick="toggleForm('login')">Quay lại đăng nhập</span>
            </div>
        </div>
    </div>

    <script>
        // 1. CHUYỂN ĐỔI GIỮA 2 FORM
        function toggleForm(type) {
            document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
            document.getElementById('formTitle').innerText = type === 'login' ? '🍿 Đăng Nhập' : '📝 Đăng Ký Tài Khoản';
            
            // Xóa dữ liệu cũ khi chuyển form
            document.querySelectorAll('input').forEach(input => input.value = '');
            document.getElementById('userCheckMsg').innerText = '';
            document.getElementById('passCheckMsg').innerText = '';
        }

        // 2. REAL-TIME CHECK: TÀI KHOẢN TỒN TẠI CHƯA
        let timeout = null;
        document.getElementById('regUsername').addEventListener('input', (e) => {
            clearTimeout(timeout);
            const username = e.target.value.trim();
            const msg = document.getElementById('userCheckMsg');
            
            if (username.length < 3) {
                msg.innerText = '';
                return;
            }

            // Đợi người dùng gõ xong nửa giây mới gọi API (tránh lag server)
            timeout = setTimeout(async () => {
                try {
                    const res = await fetch(`http://localhost:8080/api/check-username?username=${username}`);
                    const exists = await res.json();
                    if (exists) {
                        msg.style.color = 'var(--danger)'; 
                        msg.innerText = '❌ Đã tồn tại';
                    } else {
                        msg.style.color = 'var(--success)'; 
                        msg.innerText = '✅ Khả dụng';
                    }
                } catch (err) { console.error(err); }
            }, 500);
        });

        // 3. REAL-TIME CHECK: MẬT KHẨU KHỚP NHAU KHÔNG
        document.getElementById('regConfirmPassword').addEventListener('input', (e) => {
            const pass = document.getElementById('regPassword').value;
            const confirmPass = e.target.value;
            const msg = document.getElementById('passCheckMsg');

            if (confirmPass.length === 0) {
                msg.innerText = '';
            } else if (pass === confirmPass) {
                msg.style.color = 'var(--success)';
                msg.innerText = '✅ Khớp';
            } else {
                msg.style.color = 'var(--danger)';
                msg.innerText = '❌ Lệch';
            }
        });

        // 4. XỬ LÝ ĐĂNG KÝ
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPass = document.getElementById('regConfirmPassword').value;
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();

            if (!username || !password || !email || !phone) {
                return alert("Vui lòng điền đủ thông tin!");
            }
            if (password !== confirmPass) {
                return alert("Mật khẩu nhập lại không khớp!");
            }
            if (document.getElementById('userCheckMsg').innerText.includes('❌')) {
                return alert("Tên tài khoản này đã có người sử dụng!");
            }

            try {
                const res = await fetch('http://localhost:8080/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email, phone }) 
                });

                if (res.ok) {
                    alert("🎉 Đăng ký thành công! Hãy đăng nhập ngay.");
                    toggleForm('login');
                } else {
                    alert(await res.text());
                }
            } catch (err) { alert("Lỗi kết nối máy chủ!"); }
        });

        // 5. XỬ LÝ ĐĂNG NHẬP 
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const usernameInput = document.getElementById('loginUsername').value;
            const passwordInput = document.getElementById('loginPassword').value;

            if (!usernameInput || !passwordInput) return alert("Vui lòng nhập đầy đủ thông tin!");

            try {
                const response = await fetch('http://localhost:8080/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                if (response.ok) {
                    const data = await response.json(); 
                    localStorage.setItem('currentUser', data.username);
                    localStorage.setItem('currentRole', data.role);
                    window.location.href = data.role === 'ADMIN' ? 'admin.html' : 'index.html';
                } else {
                    alert(await response.text());
                }
            } catch (error) { alert("Lỗi kết nối máy chủ!"); }
        });
    </script>
</body>
</html>
