<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị - Sou Cinema</title>
    <style>
        /* --- ĐỒNG BỘ BIẾN MÀU SẮC TỪ INDEX --- */
        :root {
            --bg-main: #0f172a;        
            --bg-panel: #1e293b;       
            --accent: #00e5ff;         
            --accent-hover: #00b3cc;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 40px 20px;
        }

        /* --- CONTAINER CHÍNH --- */
        .admin-container {
            background: var(--bg-panel); padding: 35px 40px;
            border-radius: 16px; width: 100%; max-width: 1100px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
        }

        /* --- HEADER --- */
        .header-info {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px; margin-bottom: 30px;
        }
        .header-info h2 {
            color: var(--accent); font-size: 26px; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }
        .admin-profile { display: flex; align-items: center; gap: 15px; }
        .admin-profile span { font-size: 16px; color: var(--text-muted); }
        .admin-profile b { color: var(--accent); font-size: 18px; }

        h3 {
            font-size: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
            color: #fff; border-left: 4px solid var(--accent); padding-left: 10px;
        }

        /* --- HỆ THỐNG NÚT BẤM (GIỮ NGUYÊN TÊN CLASS CỦA JS) --- */
        button {
            padding: 10px 18px; border-radius: 8px; border: none; font-weight: bold;
            cursor: pointer; transition: all 0.3s ease; font-size: 14px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .btn-logout { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-logout:hover { background: var(--border); color: #fff; }
        
        .btn-danger { background: var(--danger); color: white; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: var(--danger-hover); }
        
        .btn-primary { background: var(--accent); color: #000; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2); }
        .btn-primary:hover { background: var(--accent-hover); }
        
        .btn-warning { background: var(--warning); color: #000; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.2); }
        .btn-warning:hover { background: var(--warning-hover); }

        /* --- FORM NHẬP LIỆU --- */
        .form-group {
            display: flex; gap: 15px; margin-bottom: 25px; align-items: center; flex-wrap: wrap;
            background: rgba(15, 23, 42, 0.5); padding: 20px; border-radius: 10px; border: 1px dashed var(--border);
        }
        .form-group input, .form-group select {
            flex: 1; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-main); color: var(--text-main); min-width: 180px;
            font-size: 14px; transition: all 0.3s ease; outline: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.15);
        }
        .form-group input[type="file"] { padding: 9px; cursor: pointer; }

        /* --- BẢNG DỮ LIỆU --- */
        table {
            width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 15px;
            border-radius: 10px; overflow: hidden; border: 1px solid var(--border);
        }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { 
            background: rgba(0, 229, 255, 0.05); color: var(--accent); 
            font-weight: bold; text-transform: uppercase; font-size: 13px; letter-spacing: 1px;
        }
        tr { transition: background 0.3s; background: var(--bg-panel); }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        tr:last-child td { border-bottom: none; } /* Bỏ gạch chân hàng cuối */
        
        .poster-img { 
            width: 60px; height: 80px; object-fit: cover; border-radius: 6px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid var(--border);
        }

        hr { border: none; height: 1px; background: var(--border); margin: 40px 0; }

        /* --- KHU VỰC LỌC & SƠ ĐỒ GHẾ --- */
        .filter-controls {
            display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;
        }
        .filter-controls > div { flex: 1; min-width: 150px; }
        .filter-controls label { display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 8px; text-transform: uppercase; }
        
        .seat-dashboard {
            background: var(--bg-main); padding: 30px 20px; border-radius: 12px; margin-top: 25px;
            border: 1px solid var(--border); text-align: center;
        }
        
        /* Màn hình 3D */
        .screen {
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            height: 40px; width: 80%; max-width: 350px; margin: 0 auto 30px auto;
            transform: perspective(300px) rotateX(-15deg); border-radius: 6px;
            box-shadow: 0 15px 30px rgba(0, 229, 255, 0.3);
        }
        
        .seat-map-admin { display: flex; flex-direction: column; gap: 10px; overflow-x: auto; padding-bottom: 10px;}
        .row { display: flex; justify-content: center; gap: 10px; }
        .seat {
            background: var(--border); height: 35px; width: 40px; margin: 0;
            border-radius: 8px 8px 4px 4px; display: flex; justify-content: center; align-items: center;
            font-size: 12px; font-weight: bold; color: var(--text-muted); cursor: default;
            border-bottom: 4px solid #1e293b; transition: all 0.3s;
        }
        /* Ghế trống màu xám, ghế có khách màu ĐỎ (Danger) */
        .seat.occupied { 
            background: var(--danger); border-bottom-color: #991b1b; 
            color: #fff; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header-info">
            <h2>Bảng Điều Khiển Admin</h2>
            <div class="admin-profile">
                <span>Trực ban: <b id="adminName">Admin</b></span>
                <button id="logoutBtn" class="btn-logout">Đăng xuất</button>
            </div>
        </div>

        <h3>🎬 Quản Lý Phim</h3>
        <form id="movieForm" class="form-group" enctype="multipart/form-data">
            <input type="hidden" id="movieId">
            <input type="text" id="movieTitle" placeholder="Tên phim (VD: Dune 2)" required>
            <input type="number" id="moviePrice" placeholder="Giá vé (VNĐ)" required>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="color: var(--text-muted); white-space: nowrap;">Poster:</label>
                <input type="file" id="moviePosterFile" accept="image/*" required>
            </div>
            <button type="submit" id="saveBtn" class="btn-primary">➕ Thêm Phim</button>
            <button type="button" id="cancelBtn" class="btn-logout" style="display: none;">Hủy</button>
        </form>
        
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th width="80">Ảnh</th><th>Tên Phim</th><th>Giá Vé</th><th width="200">Hành Động</th></tr></thead>
                <tbody id="movieTableBody"></tbody>
            </table>
        </div>

        <hr>

        <h3>🍿 Quản Lý Menu Đồ Ăn</h3>
        <form id="foodForm" class="form-group" enctype="multipart/form-data">
            <input type="hidden" id="foodId">
            <input type="text" id="foodName" placeholder="Tên món (VD: Combo 1 Bắp 2 Nước)" required>
            <input type="number" id="foodPrice" placeholder="Giá tiền (VNĐ)" required>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="color: var(--text-muted); white-space: nowrap;">Ảnh:</label>
                <input type="file" id="foodImageFile" accept="image/*" required>
            </div>
            <button type="submit" id="saveFoodBtn" class="btn-primary">➕ Thêm Món</button>
            <button type="button" id="cancelFoodBtn" class="btn-logout" style="display: none;">Hủy</button>
        </form>
        
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th width="80">Ảnh</th><th>Tên Món</th><th>Giá Tiền</th><th width="200">Hành Động</th></tr></thead>
                <tbody id="foodTableBody"></tbody>
            </table>
        </div>

        <hr>

        <h3>🎟️ Theo Dõi & Quản Lý Phòng Chiếu</h3>
        <div class="filter-controls">
            <div>
                <label>Phim Đang Chiếu</label>
                <select id="adminMovieSelect" style="width: 100%;"></select>
            </div>
            <div>
                <label>Rạp</label>
                <select id="adminRoomSelect" style="width: 100%;">
                    <option value="Rạp 1">Rạp 1</option>
                    <option value="Rạp 2">Rạp 2</option>
                    <option value="Rạp 3">Rạp 3</option>
                </select>
            </div>
            <div>
                <label>Ngày Chiếu</label>
                <select id="adminDateSelect" style="width: 100%;"></select>
            </div>
            <div>
                <label>Giờ Chiếu</label>
                <select id="adminTimeSelect" style="width: 100%;"></select>
            </div>
            
            <button id="viewSeatsBtn" class="btn-primary" style="height: 44px;">👁️ Lọc Dữ Liệu</button>
            <button id="clearMovieSeatsBtn" class="btn-danger" style="height: 44px;">🗑️ Xóa sạch rạp này</button>
        </div>

        <div class="seat-dashboard">
            <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 14px;">
                <b>Trạng thái:</b> Ghế xám là còn trống, ghế <span style="color: var(--danger); font-weight: bold;">Màu Đỏ</span> là đã có khách mua.
            </p>
            <div class="seat-map-admin">
                <div class="screen"></div>
                <div class="row">
                    <div class="seat" data-seat="A1">A1</div><div class="seat" data-seat="A2">A2</div>
                    <div class="seat" data-seat="A3">A3</div><div class="seat" data-seat="A4">A4</div>
                    <div class="seat" data-seat="A5">A5</div><div class="seat" data-seat="A6">A6</div>
                </div>
                <div class="row">
                    <div class="seat" data-seat="B1">B1</div><div class="seat" data-seat="B2">B2</div>
                    <div class="seat" data-seat="B3">B3</div><div class="seat" data-seat="B4">B4</div>
                    <div class="seat" data-seat="B5">B5</div><div class="seat" data-seat="B6">B6</div>
                </div>
                <div class="row">
                    <div class="seat" data-seat="C1">C1</div><div class="seat" data-seat="C2">C2</div>
                    <div class="seat" data-seat="C3">C3</div><div class="seat" data-seat="C4">C4</div>
                    <div class="seat" data-seat="C5">C5</div><div class="seat" data-seat="C6">C6</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- BẢO MẬT & ĐĂNG XUẤT ---
        if (localStorage.getItem('currentRole') !== 'ADMIN') window.location.href = 'login.html';
        document.getElementById('adminName').innerText = localStorage.getItem('currentUser') || 'Admin';
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        // ==========================================
        // LOGIC 1: QUẢN LÝ PHIM
        // ==========================================
        const movieForm = document.getElementById('movieForm');
        const movieTableBody = document.getElementById('movieTableBody');
        const saveBtn = document.getElementById('saveBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const adminMovieSelect = document.getElementById('adminMovieSelect');

        async function fetchMovies() {
            try {
                const response = await fetch('http://localhost:8080/api/movies');
                const movies = await response.json();
                movieTableBody.innerHTML = '';
                adminMovieSelect.innerHTML = ''; 
                
                movies.forEach(movie => {
                    movieTableBody.innerHTML += `
                        <tr>
                            <td><img src="http://localhost:8080/api/movies/image/${movie.posterFileName}" class="poster-img" onerror="this.src='https://via.placeholder.com/60'"></td>
                            <td><strong style="color: #fff; font-size: 15px;">${movie.title}</strong></td>
                            <td style="color: var(--accent); font-weight: bold;">${movie.price.toLocaleString()} VNĐ</td>
                            <td>
                                <button class="btn-warning" onclick="editMovie(${movie.id}, '${movie.title}', ${movie.price})" style="margin-right: 5px;">✏️ Sửa</button>
                                <button class="btn-danger" onclick="deleteMovie(${movie.id})">❌ Xóa</button>
                            </td>
                        </tr>`;
                    
                    const option = document.createElement('option');
                    option.value = movie.title;
                    option.textContent = movie.title;
                    adminMovieSelect.appendChild(option);
                });
                if(movies.length > 0) loadBookedSeats();
            } catch (error) { console.error("Lỗi phim:", error); }
        }

        movieForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('movieId').value;
            const fileInput = document.getElementById('moviePosterFile');
            const formData = new FormData();
            formData.append('title', document.getElementById('movieTitle').value);
            formData.append('price', document.getElementById('moviePrice').value);
            if(fileInput.files[0]) formData.append('posterFile', fileInput.files[0]);

            if (id) {
                await fetch(`http://localhost:8080/api/movies/${id}`, { method: 'PUT', body: formData });
            } else {
                if(!fileInput.files[0]) return alert("Vui lòng chọn ảnh poster!");
                await fetch('http://localhost:8080/api/movies', { method: 'POST', body: formData });
            }
            resetMovieForm();
            fetchMovies();
        });

        window.editMovie = function(id, title, price) {
            document.getElementById('movieId').value = id;
            document.getElementById('movieTitle').value = title;
            document.getElementById('moviePrice').value = price;
            document.getElementById('moviePosterFile').required = false; 
            saveBtn.innerHTML = "💾 Lưu Phim"; saveBtn.className = "btn-warning";
            cancelBtn.style.display = 'inline-block';
        };

        window.deleteMovie = async function(id) {
            if (confirm("Xóa phim này?")) {
                await fetch(`http://localhost:8080/api/movies/${id}`, { method: 'DELETE' });
                fetchMovies(); 
            }
        };

        function resetMovieForm() {
            movieForm.reset(); document.getElementById('movieId').value = '';
            document.getElementById('moviePosterFile').required = true; 
            saveBtn.innerHTML = "➕ Thêm Phim"; saveBtn.className = "btn-primary";
            cancelBtn.style.display = 'none';
        }
        cancelBtn.addEventListener('click', resetMovieForm);

        // ==========================================
        // LOGIC 2: QUẢN LÝ ĐỒ ĂN
        // ==========================================
        const foodForm = document.getElementById('foodForm');
        const foodTableBody = document.getElementById('foodTableBody');
        const saveFoodBtn = document.getElementById('saveFoodBtn');
        const cancelFoodBtn = document.getElementById('cancelFoodBtn');

        async function fetchFoods() {
            try {
                const response = await fetch('http://localhost:8080/api/foods');
                const foods = await response.json();
                foodTableBody.innerHTML = '';
                
                foods.forEach(food => {
                    foodTableBody.innerHTML += `
                        <tr>
                            <td><img src="http://localhost:8080/api/foods/image/${food.imageFileName}" class="poster-img" onerror="this.src='https://via.placeholder.com/60'"></td>
                            <td><strong style="color: #fff; font-size: 15px;">${food.name}</strong></td>
                            <td style="color: var(--accent); font-weight: bold;">${food.price.toLocaleString()} VNĐ</td>
                            <td>
                                <button class="btn-warning" onclick="editFood(${food.id}, '${food.name}', ${food.price})" style="margin-right: 5px;">✏️ Sửa</button>
                                <button class="btn-danger" onclick="deleteFood(${food.id})">❌ Xóa</button>
                            </td>
                        </tr>`;
                });
            } catch (error) { console.error("Lỗi đồ ăn:", error); }
        }

        foodForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('foodId').value;
            const fileInput = document.getElementById('foodImageFile');
            const formData = new FormData();
            formData.append('name', document.getElementById('foodName').value);
            formData.append('price', document.getElementById('foodPrice').value);
            if(fileInput.files[0]) formData.append('imageFile', fileInput.files[0]);

            if (id) {
                await fetch(`http://localhost:8080/api/foods/${id}`, { method: 'PUT', body: formData });
            } else {
                if(!fileInput.files[0]) return alert("Vui lòng chọn ảnh món ăn!");
                await fetch('http://localhost:8080/api/foods', { method: 'POST', body: formData });
            }
            resetFoodForm();
            fetchFoods();
        });

        window.editFood = function(id, name, price) {
            document.getElementById('foodId').value = id;
            document.getElementById('foodName').value = name;
            document.getElementById('foodPrice').value = price;
            document.getElementById('foodImageFile').required = false;
            saveFoodBtn.innerHTML = "💾 Lưu Món"; saveFoodBtn.className = "btn-warning";
            cancelFoodBtn.style.display = 'inline-block';
        };

        window.deleteFood = async function(id) {
            if (confirm("Xóa món này?")) {
                await fetch(`http://localhost:8080/api/foods/${id}`, { method: 'DELETE' });
                fetchFoods();
            }
        };

        function resetFoodForm() {
            foodForm.reset(); document.getElementById('foodId').value = '';
            document.getElementById('foodImageFile').required = true;
            saveFoodBtn.innerHTML = "➕ Thêm Món"; saveFoodBtn.className = "btn-primary";
            cancelFoodBtn.style.display = 'none';
        }
        cancelFoodBtn.addEventListener('click', resetFoodForm);

        // ==========================================
        // LOGIC 3: THEO DÕI GHẾ THEO PHIM
        // ==========================================
        const adminRoomSelect = document.getElementById('adminRoomSelect');
        const adminDateSelect = document.getElementById('adminDateSelect');
        const adminTimeSelect = document.getElementById('adminTimeSelect');
        const baseTimes = ["09:00", "13:30", "18:00", "21:00"];

        // Tạo 3 ngày chiếu
        for(let i=0; i<3; i++) {
            let d = new Date(); d.setDate(d.getDate() + i);
            adminDateSelect.innerHTML += `<option value="${d.toLocaleDateString('vi-VN')}">${d.toLocaleDateString('vi-VN')}</option>`;
        }

        // Cập nhật giờ khi đổi Rạp
        function updateAdminTimes() {
            let offset = adminRoomSelect.value === "Rạp 2" ? 1 : adminRoomSelect.value === "Rạp 3" ? 2 : 0;
            adminTimeSelect.innerHTML = '';
            baseTimes.forEach(time => {
                let [h, m] = time.split(':');
                let newH = parseInt(h) + offset;
                let formattedH = newH < 10 ? '0' + newH : newH;
                adminTimeSelect.innerHTML += `<option value="${formattedH}:${m}">${formattedH}:${m}</option>`;
            });
            loadBookedSeats();
        }
        adminRoomSelect.addEventListener('change', updateAdminTimes);

        async function loadBookedSeats() {
            const m = adminMovieSelect.value; const r = adminRoomSelect.value;
            const d = adminDateSelect.value; const t = adminTimeSelect.value;
            if(!m || !d || !t) return;
            try {
                const response = await fetch(`http://localhost:8080/api/booked-seats?movie=${encodeURIComponent(m)}&room=${encodeURIComponent(r)}&date=${encodeURIComponent(d)}&time=${encodeURIComponent(t)}`);
                const bookedSeats = await response.json();

                const allAdminSeats = document.querySelectorAll('.seat-map-admin .seat');
                allAdminSeats.forEach(seat => {
                    seat.classList.remove('occupied'); 
                    if (bookedSeats.includes(seat.getAttribute('data-seat'))) {
                        seat.classList.add('occupied');
                    }
                });
            } catch (error) { console.error("Lỗi tải dữ liệu ghế!"); }
        }

        document.getElementById('viewSeatsBtn').addEventListener('click', loadBookedSeats);
        adminMovieSelect.addEventListener('change', loadBookedSeats);
        adminDateSelect.addEventListener('change', loadBookedSeats);
        adminTimeSelect.addEventListener('change', loadBookedSeats);

        document.getElementById('clearMovieSeatsBtn').addEventListener('click', async () => {
            if (confirm(`⚠️ Xóa TOÀN BỘ ghế suất chiếu này?`)) {
                await fetch(`http://localhost:8080/api/clear?movie=${encodeURIComponent(adminMovieSelect.value)}&room=${encodeURIComponent(adminRoomSelect.value)}&date=${encodeURIComponent(adminDateSelect.value)}&time=${encodeURIComponent(adminTimeSelect.value)}`, { method: 'DELETE' });
                alert("✅ Đã làm trống rạp!");
                loadBookedSeats();
            }
        });

        // Khởi chạy khi vừa mở trang Admin
        fetchMovies();
        fetchFoods();
        updateAdminTimes();
    </script>
</body>
</html>
