<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Vé - Gemini Cinemas</title>
    <style>
        body {
            background-color: #242333;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-bottom: 50px;
        }

        /* --- Header --- */
        .header {
            width: 100%;
            padding: 15px 30px;
            background: #1a1927;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 2px solid #6feaf6;
        }
        .logout-btn { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* --- Bố cục chính chia 2 cột --- */
        .main-layout {
            display: flex;
            gap: 40px;
            margin-top: 30px;
            width: 90%;
            max-width: 1200px;
            align-items: flex-start;
        }

        /* Cột trái: Phim & Ghế */
        .left-col { flex: 2; display: flex; flex-direction: column; align-items: center; }
        
        /* Cột phải: Đồ ăn & Thanh toán */
        .right-col { flex: 1; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; border: 1px solid #444; }

        /* --- Khu vực chọn phim --- */
        .movie-container { margin-bottom: 20px; display: flex; align-items: center; gap: 10px;}
        .movie-container select { padding: 10px; border-radius: 5px; font-size: 16px; background: #fff; }

        /* --- Khu vực rạp chiếu --- */
        .screen {
            background-color: #fff;
            height: 70px;
            width: 100%;
            margin: 15px 0;
            transform: rotateX(-45deg);
            box-shadow: 0 3px 10px rgba(255, 255, 255, 0.7);
        }
        .seat-map { perspective: 1000px; margin-bottom: 30px; }
        .row { display: flex; justify-content: center; }
        .seat {
            background-color: #444451; height: 30px; width: 35px;
            margin: 5px; border-radius: 5px 5px 0 0; cursor: pointer; transition: 0.1s;
            /* Thêm 3 dòng này để hiện chữ A1, A2 ra giữa ghế */
            display: flex; justify-content: center; align-items: center;
            font-size: 11px; font-weight: bold; color: #aaa;
        }
        .seat.selected { background-color: #6feaf6; }
        .seat.occupied { background-color: #fff; cursor: not-allowed; }
        .seat:not(.occupied):hover { transform: scale(1.2); }
        
        /* Chú thích ghế */
        .showcase { display: flex; gap: 20px; list-style-type: none; padding: 0; color: #777; }
        .showcase li { display: flex; align-items: center; gap: 5px; }

        /* --- Khu vực Đồ ăn --- */
        .food-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #333; padding: 10px; border-radius: 5px; margin-bottom: 10px;
        }
        .food-info { display: flex; align-items: center; gap: 15px; }
        .food-img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: #6feaf6; color: #000; border: none; width: 25px; height: 25px; border-radius: 3px; cursor: pointer; font-weight: bold;}
        
        /* --- Tổng tiền & Đặt vé --- */
        .checkout-panel { margin-top: 30px; border-top: 1px solid #555; padding-top: 20px; }
        .total-text { font-size: 20px; margin-bottom: 15px; }
        .total-price { color: #6feaf6; font-size: 28px; font-weight: bold; }
        .book-btn { background: #6feaf6; color: #000; font-size: 18px; font-weight: bold; padding: 15px; width: 100%; border: none; border-radius: 5px; cursor: pointer; }
        .book-btn:hover { background: #5bc3cc; }

    </style>
</head>
<body>

    <div style="display: flex; gap: 15px; align-items: center;">
            <span>Xin chào, <b id="userName" style="color: #6feaf6;">Khách</b>!</span>
            <button id="historyBtn" style="background: #f1c40f; color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">🧾 Lịch sử mua hàng</button>
            <button id="logoutUserBtn" class="logout-btn">Đăng xuất</button>
    </div>

    <div id="historyModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: #242333; width: 600px; max-height: 80vh; border-radius: 10px; padding: 20px; border: 1px solid #6feaf6; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #555; padding-bottom: 10px;">
                <h3 style="margin: 0;">🧾 Lịch sử mua vé của bạn</h3>
                <button id="closeHistoryBtn" style="background: #ff4d4d; border: none; color: white; border-radius: 5px; padding: 5px 10px; cursor: pointer;">Đóng ❌</button>
            </div>
            
            <div id="historyList" style="overflow-y: auto; flex: 1; margin-top: 15px; padding-right: 10px;"></div>
            
            <button id="loadMoreBtn" style="margin-top: 15px; background: #6feaf6; color: #000; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; display: none;">⬇️ Xem thêm đơn cũ</button>
        </div>
    </div>

    <div class="main-layout">
        
        <div class="left-col">
            <div class="movie-container" style="display: flex; flex-wrap: wrap; gap: 15px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border: 1px solid #444; width: 100%; box-sizing: border-box;">
                <div style="display: flex; flex-direction: column; flex: 1; min-width: 150px;">
                    <label style="color: #ccc; font-size: 14px; margin-bottom: 5px;">🎬 Phim:</label>
                    <select id="movie"></select>
                </div>
                <div style="display: flex; flex-direction: column; flex: 1; min-width: 100px;">
                    <label style="color: #ccc; font-size: 14px; margin-bottom: 5px;">🚪 Rạp:</label>
                    <select id="roomSelect">
                        <option value="Rạp 1">Rạp 1</option>
                        <option value="Rạp 2">Rạp 2</option>
                        <option value="Rạp 3">Rạp 3</option>
                    </select>
                </div>
                <div style="display: flex; flex-direction: column; flex: 1; min-width: 130px;">
                    <label style="color: #ccc; font-size: 14px; margin-bottom: 5px;">📅 Ngày:</label>
                    <select id="showDate"></select>
                </div>
                <div style="display: flex; flex-direction: column; flex: 1; min-width: 100px;">
                    <label style="color: #ccc; font-size: 14px; margin-bottom: 5px;">⏰ Giờ:</label>
                    <select id="showTime"></select>
                </div>
                <div style="width: 100%; text-align: center; margin-top: 10px;">
                    <span style="color: #fff;">Giá vé: </span>
                    <span id="moviePriceDisplay" style="color: #6feaf6; font-weight: bold; font-size: 20px;">0 VNĐ</span>
                </div>
            </div>

            <ul class="showcase">
                <li><div class="seat"></div> Trống</li>
                <li><div class="seat selected"></div> Đang chọn</li>
                <li><div class="seat occupied"></div> Đã bán</li>
            </ul>

            <div class="seat-map">
                <div class="screen"></div>
                <div class="row">
                    <div class="seat" data-seat="A1">A1</div><div class="seat" data-seat="A2">A2</div>
                    <div class="seat" data-seat="A3">A3</div><div class="seat" data-seat="A4">A4</div>
                    <div class="seat" data-seat="A5">A5</div><div class="seat" data-seat="A6">A6</div>
                </div>
                <div class="row">
                    <div class="seat" data-seat="B1">B1</div><div class="seat" data-seat="B2">B2</div>
                    <div class="seat" data-seat="B3">B3</div><div class="seat" data-seat="B4">B4</div>
                    <div class="seat" data-seat="B5">B5</div><div class="seat" data-seat="B6">B6</div>
                </div>
                <div class="row">
                    <div class="seat" data-seat="C1">C1</div><div class="seat" data-seat="C2">C2</div>
                    <div class="seat" data-seat="C3">C3</div><div class="seat" data-seat="C4">C4</div>
                    <div class="seat" data-seat="C5">C5</div><div class="seat" data-seat="C6">C6</div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <h3>🍔 Chọn Bắp Nước</h3>
            <div id="foodContainer">
                <p style="color: #777;">Đang tải danh sách món...</p>
            </div>

            <div class="checkout-panel">
                <div class="total-text">Tiền ghế: <span id="seatsTotalCost">0</span> VNĐ</div>
                <div class="total-text">Tiền ăn: <span id="foodsTotalCost">0</span> VNĐ</div>
                <div class="total-text" style="margin-top: 20px;">TỔNG CỘNG: <br> <span class="total-price" id="grandTotal">0</span> VNĐ</div>
                
                <p id="message" style="color: #6feaf6; text-align: center;"></p>
                <button id="bookBtn" class="book-btn">Xác Nhận Đặt Vé</button>
            </div>
        </div>

    </div>

    <script>
        // --- 1. KIỂM TRA ĐĂNG NHẬP ---
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
            alert("Bạn cần đăng nhập để đặt vé!");
            window.location.href = 'login.html';
        }
        document.getElementById('userName').innerText = currentUser;
        document.getElementById('logoutUserBtn').addEventListener('click', () => {
            localStorage.clear(); window.location.href = 'login.html';
        });

        // --- 2. BIẾN TOÀN CỤC ---
        const movieSelect = document.getElementById('movie');
        const moviePriceDisplay = document.getElementById('moviePriceDisplay');
        const foodContainer = document.getElementById('foodContainer');
        const allSeats = document.querySelectorAll('.row .seat');
        const showDateSelect = document.getElementById('showDate');
        const showTimeSelect = document.getElementById('showTime');
        const roomSelect = document.getElementById('roomSelect');
        const baseShowTimes = ["09:00", "13:30", "18:00", "21:00"]; // Khung giờ gốc
        
        let currentMoviePrice = 0;
        let foodCart = {}; // Lưu số lượng mỗi món: { "foodId_1": 2, "foodId_2": 1 }
        let foodDataList = []; // Lưu trữ mảng đồ ăn tải từ server

        // --- 3. TẢI DỮ LIỆU TỪ SERVER (PHIM & ĐỒ ĂN) ---
        async function loadInitialData() {
            try {
                // Tải Phim
                const movieRes = await fetch('http://localhost:8080/api/movies');
                const movies = await movieRes.json();
                
                movieSelect.innerHTML = '';
                movies.forEach(movie => {
                    const option = document.createElement('option');
                    option.value = movie.title;
                    option.setAttribute('data-price', movie.price); // Giấu giá tiền vào thuộc tính
                    option.textContent = movie.title;
                    movieSelect.appendChild(option);
                });

                // Cập nhật giá phim đầu tiên
                if(movies.length > 0) {
                    currentMoviePrice = movies[0].price;
                    moviePriceDisplay.innerText = currentMoviePrice.toLocaleString() + " VNĐ/ghế";
                    fetchBookedSeats(); // Tải ghế của phim đầu tiên
                }

                // Tải Đồ Ăn
                const foodRes = await fetch('http://localhost:8080/api/foods');
                foodDataList = await foodRes.json();
                
                foodContainer.innerHTML = '';
                foodDataList.forEach(food => {
                    foodCart[food.id] = 0; // Khởi tạo giỏ hàng mỗi món = 0
                    
                    const foodHtml = `
                        <div class="food-item">
                            <div class="food-info">
                                <img src="http://localhost:8080/api/foods/image/${food.imageFileName}" class="food-img" onerror="this.src='https://via.placeholder.com/50'">
                                <div>
                                    <div style="font-weight: bold;">${food.name}</div>
                                    <div style="color: #ccc; font-size: 14px;">${food.price.toLocaleString()} VNĐ</div>
                                </div>
                            </div>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="updateFoodQty(${food.id}, -1)">-</button>
                                <span id="qty-${food.id}" style="width: 20px; text-align: center;">0</span>
                                <button class="qty-btn" onclick="updateFoodQty(${food.id}, 1)">+</button>
                            </div>
                        </div>
                    `;
                    foodContainer.innerHTML += foodHtml;

                    // DỌN SẠCH DỮ LIỆU CŨ ĐỂ KHÔNG BỊ LẶP
                showDateSelect.innerHTML = '';

                    // Tự động tạo 3 Ngày chiếu tính từ hôm nay
                    for(let i=0; i<3; i++) {
                        let d = new Date();
                        d.setDate(d.getDate() + i);
                        let dateStr = d.toLocaleDateString('vi-VN'); // VD: 20/10/2026
                        
                        let label = i === 0 ? `${dateStr}` : i === 1 ? `${dateStr}` : dateStr;
                        showDateSelect.innerHTML += `<option value="${dateStr}">${label}</option>`;
                    }
                    
                    // Sau khi mọi thứ load xong, gọi hàm lấy ghế
                    updateDynamicShowTimes();
                });
                
            } catch (error) {
                console.error("Lỗi kết nối máy chủ:", error);
                alert("Lỗi tải dữ liệu. Hãy chắc chắn Server Java đang chạy!");
            }
        }

        // HÀM TÍNH TOÁN GIỜ THEO RẠP
        function updateDynamicShowTimes() {
            const room = roomSelect.value;
            let offset = 0;
            if (room === "Rạp 2") offset = 1;
            if (room === "Rạp 3") offset = 2;

            showTimeSelect.innerHTML = '';
            baseShowTimes.forEach(time => {
                let [h, m] = time.split(':');
                let newH = parseInt(h) + offset;
                // Đảm bảo định dạng 2 chữ số (VD: 09 thay vì 9)
                let formattedH = newH < 10 ? '0' + newH : newH;
                showTimeSelect.innerHTML += `<option value="${formattedH}:${m}">${formattedH}:${m}</option>`;
            });
            fetchBookedSeats(); // Cập nhật lại ghế sau khi đổi giờ
        }

        // --- 4. TẢI GHẾ ĐÃ BÁN ---
        async function fetchBookedSeats() {
            const movieName = movieSelect.value;
            const room = roomSelect.value;
            const date = showDateSelect.value;
            const time = showTimeSelect.value;
            if(!movieName || !date || !time) return;

            try {
                const response = await fetch(`http://localhost:8080/api/booked-seats?movie=${encodeURIComponent(movieName)}&room=${encodeURIComponent(room)}&date=${encodeURIComponent(date)}&time=${encodeURIComponent(time)}`);
                const bookedSeats = await response.json();

                allSeats.forEach(seat => {
                    seat.classList.remove('selected', 'occupied');
                    if (bookedSeats.includes(seat.getAttribute('data-seat'))) {
                        seat.classList.add('occupied');
                    }
                });
                updateCartTotal();
            } catch (error) { console.error(error); }
        }

        // Bắt các sự kiện thay đổi
        movieSelect.addEventListener('change', (e) => {
            currentMoviePrice = parseInt(e.target.options[e.target.selectedIndex].getAttribute('data-price'));
            moviePriceDisplay.innerText = currentMoviePrice.toLocaleString('vi-VN') + " VNĐ";
            fetchBookedSeats();
        });
        roomSelect.addEventListener('change', updateDynamicShowTimes);
        showDateSelect.addEventListener('change', fetchBookedSeats);
        showTimeSelect.addEventListener('change', fetchBookedSeats);

        // Khi khách đổi phim -> Cập nhật giá, load lại ghế, tính lại tiền
        movieSelect.addEventListener('change', (e) => {
            currentMoviePrice = parseInt(e.target.options[e.target.selectedIndex].getAttribute('data-price'));
            moviePriceDisplay.innerText = currentMoviePrice.toLocaleString() + " VNĐ/ghế";
            fetchBookedSeats();
        });

        // --- 5. LOGIC CHỌN GHẾ & CHỌN ĐỒ ĂN ---
        
        // Chọn ghế
        document.querySelector('.seat-map').addEventListener('click', (e) => {
            if (e.target.classList.contains('seat') && !e.target.classList.contains('occupied')) {
                e.target.classList.toggle('selected');
                updateCartTotal(); // Tính lại tiền mỗi lần click
            }
        });

        // Chọn đồ ăn
        window.updateFoodQty = function(foodId, change) {
            let currentQty = foodCart[foodId];
            let newQty = currentQty + change;
            
            if(newQty >= 0 && newQty <= 10) { // Giới hạn mua tối đa 10 combo/loại
                foodCart[foodId] = newQty;
                document.getElementById(`qty-${foodId}`).innerText = newQty;
                updateCartTotal(); // Tính lại tiền
            }
        }

        // HÀM TÍNH TỔNG TIỀN (Quan trọng nhất)
        // Thêm biến này để lưu số tiền thật
        let currentGrandTotal = 0; 

        // HÀM TÍNH TỔNG TIỀN (Quan trọng nhất)
        function updateCartTotal() {
            // 1. Tính tiền ghế
            const selectedSeatsCount = document.querySelectorAll('.row .seat.selected').length;
            const seatsCost = selectedSeatsCount * currentMoviePrice;
            document.getElementById('seatsTotalCost').innerText = seatsCost.toLocaleString('vi-VN');

            // 2. Tính tiền đồ ăn
            let foodsCost = 0;
            foodDataList.forEach(food => {
                let qty = foodCart[food.id];
                foodsCost += (qty * food.price);
            });
            document.getElementById('foodsTotalCost').innerText = foodsCost.toLocaleString('vi-VN');

            // 3. Tổng cộng
            currentGrandTotal = seatsCost + foodsCost;
            document.getElementById('grandTotal').innerText = currentGrandTotal.toLocaleString('vi-VN');
        }

        // --- 6. NÚT ĐẶT VÉ ---
        document.getElementById('bookBtn').addEventListener('click', async () => {
            const selectedSeats = document.querySelectorAll('.row .seat.selected');
            const seatsArray = [...selectedSeats].map(seat => seat.getAttribute('data-seat'));
            
            if (seatsArray.length === 0) {
                alert("Bạn phải chọn ít nhất 1 ghế để xem phim chứ!");
                return;
            }

            // Tổng hợp đồ ăn thành chuỗi
            let foodDetailsArray = [];
            for (let id in foodCart) {
                if (foodCart[id] > 0) {
                    let food = foodDataList.find(f => f.id == id);
                    if(food) foodDetailsArray.push(`${food.name} (x${foodCart[id]})`);
                }
            }

            // GÓI DỮ LIỆU ĐẦY ĐỦ (Bổ sung chính xác Rạp, Ngày, Giờ)
            const bookingData = {
                username: currentUser,
                movieName: movieSelect.value,
                room: roomSelect.value,          // Bắt buộc phải có dòng này
                showDate: showDateSelect.value,  // Bắt buộc phải có dòng này
                showTime: showTimeSelect.value,  // Bắt buộc phải có dòng này
                seats: seatsArray,
                foods: foodDetailsArray.length > 0 ? foodDetailsArray.join(", ") : "Không có",
                totalPrice: currentGrandTotal
            };

            try {
                const response = await fetch('http://localhost:8080/api/book', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                });
                
                if(response.ok) {
                    // Hiện thông báo
                    document.getElementById('message').innerText = "🎉 Đặt vé thành công! Tổng hóa đơn: " + currentGrandTotal.toLocaleString('vi-VN') + " VNĐ";
                    
                    // Biến ghế vừa mua thành occupied (xám/đỏ tùy CSS)
                    selectedSeats.forEach(seat => {
                        seat.classList.remove('selected');
                        seat.classList.add('occupied');
                    });

                    // Reset bắp nước về 0
                    for (let foodId in foodCart) {
                        foodCart[foodId] = 0; 
                        const qtySpan = document.getElementById(`qty-${foodId}`);
                        if (qtySpan) {
                            qtySpan.innerText = "0";
                        }
                    }

                    // Tính lại tiền về 0
                    updateCartTotal(); 

                    setTimeout(() => {
                        document.getElementById('message').innerText = "";
                    }, 5000);
                } else {
                    alert("Lỗi khi lưu dữ liệu đặt vé!");
                }

            } catch (error) {
                document.getElementById('message').innerText = "Lỗi kết nối đến server.";
            }
        });

        // BẮT ĐẦU CHẠY
        loadInitialData();

    // ==========================================
        // 7. LOGIC LỊCH SỬ MUA HÀNG & PHÂN TRANG
        // ==========================================
        const historyModal = document.getElementById('historyModal');
        const historyList = document.getElementById('historyList');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        let currentHistoryPage = 0; // Trang hiện tại

        // Mở Modal
        document.getElementById('historyBtn').addEventListener('click', () => {
            historyModal.style.display = 'flex';
            currentHistoryPage = 0; // Reset về trang 0
            historyList.innerHTML = ''; // Xóa dữ liệu cũ
            loadHistory();
        });

        // Đóng Modal
        document.getElementById('closeHistoryBtn').addEventListener('click', () => {
            historyModal.style.display = 'none';
        });

        // Nút Xem thêm
        loadMoreBtn.addEventListener('click', () => {
            currentHistoryPage++;
            loadHistory();
        });

        // Hàm gọi API tải lịch sử
        async function loadHistory() {
            try {
                const res = await fetch(`http://localhost:8080/api/history?username=${currentUser}&page=${currentHistoryPage}`);
                const orders = await res.json();

                if (orders.length === 0 && currentHistoryPage === 0) {
                    historyList.innerHTML = '<p style="text-align: center; color: #ccc;">Bạn chưa mua vé nào.</p>';
                    loadMoreBtn.style.display = 'none';
                    return;
                }

                orders.forEach(order => {
                    const orderHtml = `
                        <div style="background: #333; border-left: 4px solid #6feaf6; padding: 10px; margin-bottom: 10px; border-radius: 5px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <b style="color: #6feaf6;">🎬 ${order.movieName}</b>
                                <span style="color: #f1c40f; font-weight: bold;">${order.totalPrice.toLocaleString('vi-VN')} VNĐ</span>
                            </div>
                            
                            <div style="font-size: 14px; color: #fff; margin-bottom: 5px; background: #444; padding: 5px; border-radius: 3px; display: inline-block;">
                                📍 ${order.room} | 📅 ${order.showDate} | ⏰ ${order.showTime}
                            </div>
                            
                            <div style="font-size: 14px; color: #ccc;">🎟️ Ghế: ${order.seats}</div>
                            <div style="font-size: 14px; color: #ccc;">🍿 Combo: ${order.foods}</div>
                        </div>
                    `;
                    historyList.innerHTML += orderHtml;
                });

                // Nếu trả về đủ 20 đơn -> Có thể còn nữa -> Hiện nút "Xem thêm"
                // Nếu trả về < 20 đơn -> Đã hết sạch -> Ẩn nút "Xem thêm"
                if (orders.length === 20) {
                    loadMoreBtn.style.display = 'block';
                } else {
                    loadMoreBtn.style.display = 'none';
                }

            } catch (error) {
                historyList.innerHTML = '<p style="color: red;">Lỗi kết nối máy chủ.</p>';
            }
        }

    </script>
</body>
</html>
